name: Release Helm Chart

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['charts/knodex-demo-catalog--release_created'] }}
      tag_name: ${{ steps.release.outputs['charts/knodex-demo-catalog--tag_name'] }}
      version: ${{ steps.release.outputs['charts/knodex-demo-catalog--version'] }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-chart:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build dependencies
        run: helm dependency build charts/knodex-demo-catalog/

      - name: Package chart
        run: helm package charts/knodex-demo-catalog/ --destination .helm-packages

      - name: Push to GHCR
        run: helm push .helm-packages/*.tgz oci://ghcr.io/knodex/charts
