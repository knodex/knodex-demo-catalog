# AKS Cluster (Fake/Demo)
# Simulates an AKS cluster RGD using a ConfigMap to expose OIDC URL and admin group
# Target: Platform Operators, Developers
---
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: aks
  annotations:
    kro.run/allow-breaking-changes: "true"
    knodex.io/catalog: "true"
    knodex.io/title: "AKS Cluster (Demo)"
    knodex.io/category: "compute"
    knodex.io/tags: "aks,kubernetes,compute,demo"
    knodex.io/description: |
      Demo AKS cluster RGD - uses a ConfigMap to simulate cluster outputs
      including OIDC issuer URL and admin group. Not a real AKS deployment.
    knodex.io/target-audience: "platform-operators,developers"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AKSCluster
    spec:
      # === REQUIRED INPUTS ===
      name: string
      location: string | default="canadacentral"
      adminGroupObjectId: string

      # === OPTIONAL INPUTS ===
      kubernetesVersion: string | default="1.30"
      nodeCount: integer | default=3
      nodeVmSize: string | default="Standard_D4s_v5"
      oidcIssuerUrl: string | default="https://oidc.prod-aks.azure.com/00000000-0000-0000-0000-000000000000/"

    # === STATUS OUTPUTS ===
    status:
      clusterName: ${clusterMeta.data.clusterName}
      location: ${clusterMeta.data.location}
      oidcIssuerUrl: ${clusterMeta.data.oidcIssuerUrl}
      adminGroupObjectId: ${clusterMeta.data.adminGroupObjectId}
      kubernetesVersion: ${clusterMeta.data.kubernetesVersion}

  # === RESOURCES ===
  resources:
    # Fake cluster metadata (simulates AKS status outputs)
    - id: clusterMeta
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: aks-${schema.spec.name}-meta
          labels:
            app.kubernetes.io/managed-by: kro
            knodex.io/fake: "true"
        data:
          clusterName: ${schema.spec.name}
          location: ${schema.spec.location}
          oidcIssuerUrl: ${schema.spec.oidcIssuerUrl}
          adminGroupObjectId: ${schema.spec.adminGroupObjectId}
          kubernetesVersion: ${schema.spec.kubernetesVersion}
