# Azure Landing Zone Hub VNet
# Deploys hub VNet with ALZ-compliant subnet layout for firewall, bastion, gateway, and DNS
# Deploy addon RGDs (Bastion, DNS, Gateway) separately - they reference this hub via externalRef
# Or deploy alz-hub-composable for a one-stop hub + addons experience
# Target: Platform Operators
---
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: alz-hub
  annotations:
    kro.run/allow-breaking-changes: "true"
    knodex.io/catalog: "true"
    knodex.io/title: "Azure Landing Zone Hub VNet"
    knodex.io/category: "networking"
    knodex.io/tags: "alz,hub-spoke,enterprise,networking"
    knodex.io/description: |
      Hub VNet for Azure Landing Zone connectivity - includes pre-sized subnets for
      Azure Firewall, Bastion, VPN/ExpressRoute Gateway, and DNS Resolver.
      Deploy addon RGDs separately for Bastion, DNS, and Gateway capabilities,
      or use the Composable Hub for a single-resource deployment with all addons.
    knodex.io/target-audience: "platform-operators"
spec:
  schema:
    apiVersion: v1alpha1
    kind: ALZHub
    spec:
      # === REQUIRED INPUTS ===
      name: string
      location: string | default="canadacentral"

      # === ADVANCED CONFIGURATION (hidden by default in UI) ===
      advanced:
        # Resource tags (applied to all Azure resources)
        tags: "map[string]string"
        # Subnet sizing
        vnetAddressSpace: string | default="10.0.0.0/22"
        firewallSubnetPrefix: string | default="10.0.0.0/26"
        bastionSubnetPrefix: string | default="10.0.0.64/26"
        gatewaySubnetPrefix: string | default="10.0.0.128/27"
        dnsInboundSubnetPrefix: string | default="10.0.1.0/28"
        dnsOutboundSubnetPrefix: string | default="10.0.1.16/28"

    # === STATUS OUTPUTS ===
    status:
      location: ${resourceGroup.spec.location}
      resourceGroupName: ${resourceGroup.metadata.name}
      vnetName: ${hubVnet.status.?name.orValue("")}
      vnetId: ${hubVnet.status.?id.orValue("")}
      firewallSubnetId: ${subnetFirewall.status.?id.orValue("")}
      bastionSubnetId: ${subnetBastion.status.?id.orValue("")}
      gatewaySubnetId: ${subnetGateway.status.?id.orValue("")}
      dnsInboundSubnetId: ${subnetDnsInbound.status.?id.orValue("")}
      dnsOutboundSubnetId: ${subnetDnsOutbound.status.?id.orValue("")}
      spokeRouteTableId: ${routeTableSpokeToFirewall.status.?id.orValue("")}

  # === RESOURCES ===
  resources:
    # Resource Group
    - id: resourceGroup
      template:
        apiVersion: resources.azure.com/v1api20200601
        kind: ResourceGroup
        metadata:
          name: rg-${schema.spec.name}-hub
        spec:
          location: ${schema.spec.location}
          tags: ${schema.spec.advanced.tags}

    # Route Table for Spoke-to-Firewall traffic
    - id: routeTableSpokeToFirewall
      template:
        apiVersion: network.azure.com/v1api20240301
        kind: RouteTable
        metadata:
          name: rt-${schema.spec.name}-spoke-to-fw
        spec:
          owner:
            name: ${resourceGroup.metadata.name}
          location: ${schema.spec.location}
          tags: ${schema.spec.advanced.tags}

    # Hub Virtual Network
    - id: hubVnet
      template:
        apiVersion: network.azure.com/v1api20240301
        kind: VirtualNetwork
        metadata:
          name: vnet-${schema.spec.name}-hub
        spec:
          owner:
            name: ${resourceGroup.metadata.name}
          location: ${schema.spec.location}
          addressSpace:
            addressPrefixes:
              - ${schema.spec.advanced.vnetAddressSpace}
          tags: ${schema.spec.advanced.tags}

    # Subnets
    - id: subnetFirewall
      template:
        apiVersion: network.azure.com/v1api20240301
        kind: VirtualNetworksSubnet
        metadata:
          name: vnet-${schema.spec.name}-hub-azurefirewallsubnet
        spec:
          owner:
            name: ${hubVnet.metadata.name}
          azureName: AzureFirewallSubnet
          addressPrefix: ${schema.spec.advanced.firewallSubnetPrefix}

    - id: subnetBastion
      template:
        apiVersion: network.azure.com/v1api20240301
        kind: VirtualNetworksSubnet
        metadata:
          name: vnet-${schema.spec.name}-hub-azurebastionsubnet
        spec:
          owner:
            name: ${hubVnet.metadata.name}
          azureName: AzureBastionSubnet
          addressPrefix: ${schema.spec.advanced.bastionSubnetPrefix}

    - id: subnetGateway
      template:
        apiVersion: network.azure.com/v1api20240301
        kind: VirtualNetworksSubnet
        metadata:
          name: vnet-${schema.spec.name}-hub-gatewaysubnet
        spec:
          owner:
            name: ${hubVnet.metadata.name}
          azureName: GatewaySubnet
          addressPrefix: ${schema.spec.advanced.gatewaySubnetPrefix}

    - id: subnetDnsInbound
      template:
        apiVersion: network.azure.com/v1api20240301
        kind: VirtualNetworksSubnet
        metadata:
          name: vnet-${schema.spec.name}-hub-dns-inbound
        spec:
          owner:
            name: ${hubVnet.metadata.name}
          azureName: snet-dns-inbound
          addressPrefix: ${schema.spec.advanced.dnsInboundSubnetPrefix}
          delegations:
            - name: dns-resolver-delegation
              serviceName: Microsoft.Network/dnsResolvers

    - id: subnetDnsOutbound
      template:
        apiVersion: network.azure.com/v1api20240301
        kind: VirtualNetworksSubnet
        metadata:
          name: vnet-${schema.spec.name}-hub-dns-outbound
        spec:
          owner:
            name: ${hubVnet.metadata.name}
          azureName: snet-dns-outbound
          addressPrefix: ${schema.spec.advanced.dnsOutboundSubnetPrefix}
          delegations:
            - name: dns-resolver-delegation
              serviceName: Microsoft.Network/dnsResolvers
