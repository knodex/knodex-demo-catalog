# ASO Credential - Azure Service Operator Authentication
# Target: Platform Engineers, Developers
# Purpose: Foundation credential for all ASO-based RGDs
# Supports: Service Principal, Workload Identity
---
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: aso-credential
  annotations:
    kro.run/allow-breaking-changes: "true"
    knodex.io/catalog: "true"
    knodex.io/title: "ASO Credential"
    knodex.io/category: "foundation"
    knodex.io/tags: "aso,credential,authentication,security"
    knodex.io/description: |
      Azure credential for ASO resource provisioning - supports Service Principal
      and Workload Identity.
    knodex.io/target-audience: "platform-engineers,developers"
    knodex.io/composable: "true"
spec:
  schema:
    apiVersion: v1alpha1
    kind: ASOCredential
    spec:
      # === REQUIRED INPUTS ===
      name: string
      subscriptionId: string
      tenantId: string
      clientId: string
      clientSecret: string | default=""

      # === ADVANCED INPUTS ===
      advanced:
        # Authentication type
        authType: string | default="servicePrincipal"

        # Workload Identity settings
        workloadIdentity:
          serviceAccountName: string | default=""

    # === STATUS OUTPUTS ===
    status:
      # Core credential info
      secretName: ${credentialSecret.metadata.name}
      secretNamespace: ${credentialSecret.metadata.namespace}
      ready: ${credentialSecret.metadata.name != ""}

      # Workload Identity (uses orValue for conditional resource)
      serviceAccountName: ${serviceAccount.metadata.?name.orValue("")}


  # === RESOURCES ===
  resources:
    # Core: ASO Credential Secret
    - id: credentialSecret
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: aso-cred-${schema.spec.name}
          labels:
            app.kubernetes.io/managed-by: kro
            knodex.io/credential-type: ${schema.spec.advanced.authType}
        type: Opaque
        stringData:
          AZURE_SUBSCRIPTION_ID: ${schema.spec.subscriptionId}
          AZURE_TENANT_ID: ${schema.spec.tenantId}
          AZURE_CLIENT_ID: ${schema.spec.clientId}
          AZURE_CLIENT_SECRET: ${schema.spec.clientSecret}

    # Conditional: ServiceAccount for Workload Identity
    - id: serviceAccount
      includeWhen:
        - ${schema.spec.advanced.authType == "workloadIdentity"}
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: '${schema.spec.advanced.workloadIdentity.serviceAccountName != "" ? schema.spec.advanced.workloadIdentity.serviceAccountName : "aso-cred-" + schema.spec.name + "-sa"}'
          labels:
            app.kubernetes.io/managed-by: kro
            azure.workload.identity/use: "true"
          annotations:
            azure.workload.identity/client-id: ${schema.spec.clientId}
            azure.workload.identity/tenant-id: ${schema.spec.tenantId}

