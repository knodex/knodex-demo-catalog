apiVersion: v2
name: demo-catalog-azure
description: |
  Demo catalog of Azure Landing Zone RGDs using Kro Resource Graph Definitions.
  Provides ASO Credential, Hub VNet, and Spoke VNet patterns for demonstration.

type: application

version: 0.1.0
appVersion: "0.1.0"

keywords:
  - azure
  - kro
  - rgd
  - aso
  - kubernetes
  - infrastructure
  - demo

home: https://github.com/knodex/knodex-demo-catalog

sources:
  - https://github.com/knodex/knodex-demo-catalog

maintainers:
  - name: knodex
    email: tparis@provops.com

kubeVersion: ">=1.30.0"

annotations:
  knodex.io/aso-version: ">=2.13.0"
  knodex.io/kro-version: ">=0.7.0"
  category: infrastructure
  artifacthub.io/license: Apache-2.0

dependencies:
  - name: azure-service-operator
    version: "2.18.0"
    repository: "https://raw.githubusercontent.com/Azure/azure-service-operator/main/v2/charts"
    condition: azure-service-operator.enabled
  - name: kro
    version: "0.8.5"
    repository: "oci://registry.k8s.io/kro/charts"
    condition: kro.enabled
