# ASO Credential - Azure Service Operator Authentication
# Target: Platform Engineers, Developers
# Purpose: Foundation credential for all ASO-based RGDs
# Supports: Service Principal, Workload Identity
# Optional: Permission validation Job
---
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: aso-credential
  annotations:
    kro.run/allow-breaking-changes: "true"
    knodex.io/catalog: "true"
    knodex.io/title: "ASO Credential"
    knodex.io/category: "foundation"
    knodex.io/tags: "aso,credential,authentication,security,rbac"
    knodex.io/description: |
      Azure credential for ASO resource provisioning - supports Service Principal
      and Workload Identity. Optional permission check validates RBAC roles.
    knodex.io/target-audience: "platform-engineers,developers"
    knodex.io/composable: "true"
spec:
  schema:
    apiVersion: v1alpha1
    kind: ASOCredential
    spec:
      # === REQUIRED INPUTS ===
      name: string
      subscriptionId: string
      tenantId: string
      clientId: string
      clientSecret: string | default=""

      # === ADVANCED INPUTS ===
      advanced:
        # Authentication type
        authType: string | default="servicePrincipal"

        # Permission validation settings
        permissionCheck:
          enabled: boolean | default=false
          image: string | default="mcr.microsoft.com/azure-cli:latest"
          ttlSecondsAfterFinished: integer | default=300

        # Workload Identity settings
        workloadIdentity:
          serviceAccountName: string | default=""

    # === STATUS OUTPUTS ===
    status:
      # Core credential info
      secretName: ${credentialSecret.metadata.name}
      secretNamespace: ${credentialSecret.metadata.namespace}
      ready: ${credentialSecret.metadata.name != ""}

      # Workload Identity (uses orValue for conditional resource)
      serviceAccountName: ${serviceAccount.metadata.?name.orValue("")}

      # Permission check results (uses orValue for conditional ConfigMap)
      permissionCheckStatus: ${permissionResults.data.?checkCompleted.orValue("NotRun")}
      hasNetworkContributor: ${permissionResults.data.?hasNetworkContributor.orValue("")}
      hasKeyVaultAccess: ${permissionResults.data.?hasKeyVaultAccess.orValue("")}
      hasAcrPush: ${permissionResults.data.?hasAcrPush.orValue("")}
      hasAcrPull: ${permissionResults.data.?hasAcrPull.orValue("")}
      hasContributor: ${permissionResults.data.?hasContributor.orValue("")}

  # === RESOURCES ===
  resources:
    # Core: ASO Credential Secret
    - id: credentialSecret
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: aso-cred-${schema.spec.name}
          labels:
            app.kubernetes.io/managed-by: kro
            knodex.io/credential-type: ${schema.spec.advanced.authType}
        type: Opaque
        stringData:
          AZURE_SUBSCRIPTION_ID: ${schema.spec.subscriptionId}
          AZURE_TENANT_ID: ${schema.spec.tenantId}
          AZURE_CLIENT_ID: ${schema.spec.clientId}
          AZURE_CLIENT_SECRET: ${schema.spec.clientSecret}

    # Conditional: ServiceAccount for Workload Identity
    - id: serviceAccount
      includeWhen:
        - ${schema.spec.advanced.authType == "workloadIdentity"}
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: '${schema.spec.advanced.workloadIdentity.serviceAccountName != "" ? schema.spec.advanced.workloadIdentity.serviceAccountName : "aso-cred-" + schema.spec.name + "-sa"}'
          labels:
            app.kubernetes.io/managed-by: kro
            azure.workload.identity/use: "true"
          annotations:
            azure.workload.identity/client-id: ${schema.spec.clientId}
            azure.workload.identity/tenant-id: ${schema.spec.tenantId}

    # Conditional: Permission Checker Job
    - id: permissionChecker
      includeWhen:
        - ${schema.spec.advanced.permissionCheck.enabled == true}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: aso-cred-${schema.spec.name}-permission-check
          labels:
            app.kubernetes.io/managed-by: kro
            knodex.io/permission-check: "true"
        spec:
          ttlSecondsAfterFinished: ${schema.spec.advanced.permissionCheck.ttlSecondsAfterFinished}
          backoffLimit: 1
          template:
            spec:
              restartPolicy: Never
              serviceAccountName: default
              containers:
                - name: checker
                  image: ${schema.spec.advanced.permissionCheck.image}
                  env:
                    - name: AZURE_SUBSCRIPTION_ID
                      valueFrom:
                        secretKeyRef:
                          name: ${credentialSecret.metadata.name}
                          key: AZURE_SUBSCRIPTION_ID
                    - name: AZURE_TENANT_ID
                      valueFrom:
                        secretKeyRef:
                          name: ${credentialSecret.metadata.name}
                          key: AZURE_TENANT_ID
                    - name: AZURE_CLIENT_ID
                      valueFrom:
                        secretKeyRef:
                          name: ${credentialSecret.metadata.name}
                          key: AZURE_CLIENT_ID
                    - name: AZURE_CLIENT_SECRET
                      valueFrom:
                        secretKeyRef:
                          name: ${credentialSecret.metadata.name}
                          key: AZURE_CLIENT_SECRET
                    - name: CONFIGMAP_NAME
                      value: aso-cred-${schema.spec.name}-permissions
                    - name: NAMESPACE
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.namespace
                  command:
                    - /bin/bash
                    - -c
                    - |
                      set -e

                      echo "Logging into Azure..."
                      az login --service-principal \
                        -u "$AZURE_CLIENT_ID" \
                        -p "$AZURE_CLIENT_SECRET" \
                        -t "$AZURE_TENANT_ID" \
                        --output none

                      az account set --subscription "$AZURE_SUBSCRIPTION_ID"

                      SCOPE="/subscriptions/$AZURE_SUBSCRIPTION_ID"

                      check_role() {
                        local role="$1"
                        if az role assignment list \
                          --assignee "$AZURE_CLIENT_ID" \
                          --scope "$SCOPE" \
                          --query "[?roleDefinitionName=='$role']" \
                          -o tsv 2>/dev/null | grep -q .; then
                          echo "true"
                        else
                          echo "false"
                        fi
                      }

                      echo "Checking Azure RBAC permissions..."
                      HAS_NETWORK=$(check_role "Network Contributor")
                      HAS_KEYVAULT=$(check_role "Key Vault Administrator")
                      HAS_ACR_PUSH=$(check_role "AcrPush")
                      HAS_ACR_PULL=$(check_role "AcrPull")
                      HAS_CONTRIBUTOR=$(check_role "Contributor")

                      echo "Results:"
                      echo "  Network Contributor: $HAS_NETWORK"
                      echo "  Key Vault Administrator: $HAS_KEYVAULT"
                      echo "  AcrPush: $HAS_ACR_PUSH"
                      echo "  AcrPull: $HAS_ACR_PULL"
                      echo "  Contributor: $HAS_CONTRIBUTOR"

                      echo "Creating ConfigMap with results..."
                      kubectl create configmap "$CONFIGMAP_NAME" \
                        --namespace "$NAMESPACE" \
                        --from-literal=hasNetworkContributor="$HAS_NETWORK" \
                        --from-literal=hasKeyVaultAccess="$HAS_KEYVAULT" \
                        --from-literal=hasAcrPush="$HAS_ACR_PUSH" \
                        --from-literal=hasAcrPull="$HAS_ACR_PULL" \
                        --from-literal=hasContributor="$HAS_CONTRIBUTOR" \
                        --from-literal=checkCompleted="true" \
                        --dry-run=client -o yaml | kubectl apply -f -

                      echo "Permission check complete!"

    # External Reference to Permission Results ConfigMap (created by permissionChecker Job)
    - id: permissionResults
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: aso-cred-${schema.spec.name}-permissions
          namespace: ${schema.metadata.namespace}
